services:
  istoreos:
    # 使用已发布到 GHCR 的 ARM64 定制镜像
    # 默认标签：ghcr.io/jiao1yin2he3/istoreos-clashfn:minimal-v1
    # 如需固定到某次发布，也可改成 sha-* 或版本 tag
    image: ghcr.io/jiao1yin2he3/istoreos-clashfn:minimal-v1
    container_name: istoreos
    privileged: true
    restart: always
    command: /sbin/init
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data/root:/root
      - ./data/etc:/etc
      - ./data/upper:/overlay
    networks:
      ios_macnet:
        # 这里改成一个未被占用的固定 IP
        ipv4_address: 192.168.66.2

networks:
  ios_macnet:
    name: ios_macnet
    driver: macvlan
    driver_opts:
      # 这里替换为你设备的网卡名称（比如 eth0、end0、enp1s0、enp1s0-ovs 等）
      # 可用 ip link show 查看
      parent: end0
    ipam:
      config:
        - subnet: 192.168.66.0/24
          gateway: 192.168.66.1
