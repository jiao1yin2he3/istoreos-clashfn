services:
  istoreos:
    # 使用你自己的 ARM64 定制镜像
    # 本地构建后可直接写：istoreos-fn:minimal-v1
    # 如果后续推到镜像仓库，可改成：yourname/istoreos-fn:minimal-v1
    image: istoreos-fn:minimal-v1
    container_name: istoreos
    privileged: true
    restart: always
    command: /sbin/init
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data/root:/root
      - ./data/etc:/etc
      - ./data/upper:/overlay
    networks:
      ios_macnet:
        # 这里改成一个未被占用的固定 IP
        ipv4_address: 192.168.66.2

networks:
  ios_macnet:
    name: ios_macnet
    driver: macvlan
    driver_opts:
      # 这里替换为你设备的网卡名称（比如 eth0、end0、enp1s0、enp1s0-ovs 等）
      # 可用 ip link show 查看
      parent: end0
    ipam:
      config:
        - subnet: 192.168.66.0/24
          gateway: 192.168.66.1
